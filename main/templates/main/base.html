<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Media 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Глобальные стили */
        body { 
            background: #080808; 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }
        
        .navbar { 
            background: #000 !important; 
            border-bottom: 2px solid #e50914; 
        }

        /* Карточки на главной */
        .card { 
            background: #121212; 
            border: 1px solid #222; 
            transition: 0.3s; 
        }
        .card:hover { transform: scale(1.02); border-color: #e50914; }
        .card-title { color: #fff; font-weight: bold; }

        /* ОПИСАНИЕ ПЕРСОНАЖЕЙ (Исправляем видимость) */
        .char-card {
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: flex;
            align-items: stretch;
            min-height: 120px;
        }
        
        .char-img {
            width: 120px;
            object-fit: cover;
            border-right: 3px solid #e50914;
        }

        .char-info { padding: 15px; }
        
        .char-name { 
            color: #e50914; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .char-text { 
            color: #ffffff !important; /* Чисто белый текст для описания */
            font-size: 0.95rem;
            line-height: 1.4;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); /* Чтобы лучше читалось */
        }

        /* Дополнительные блоки (Миссии/Сюжет) */
        .extra-section {
            background: #111;
            border-left: 4px solid #ffc107;
            padding: 20px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }
        .extra-title { color: #ffc107; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <form class="d-flex ms-auto me-3" action="{% url 'index' %}" method="get">
            <input class="form-control form-control-sm bg-dark text-white border-secondary shadow-none" 
                type="search" name="q" placeholder="Поиск проекта..." 
                aria-label="Search" value="{{ query|default:'' }}">
            <button class="btn btn-outline-danger btn-sm ms-2" type="submit">Найти</button>
        </form>
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/">🎬 PROJECT_MEDIA02</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/?cat=movie">Фильмы</a>
                <a class="nav-link" href="/?cat=series">Сериалы</a>
                <a class="nav-link" href="/?cat=game">Игры</a>
                <a href="/admin/" class="btn btn-danger btn-sm ms-3">АДМИНКА</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
